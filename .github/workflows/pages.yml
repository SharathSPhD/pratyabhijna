name: Deploy GitHub Pages (Astro v0.4 site)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Materialise site data assets (stats + showcase + figures + paper PDF)
        run: |
          python scripts/prepare_site_data.py

      - name: Install Astro deps
        working-directory: docs/site
        run: pnpm install --frozen-lockfile

      - name: Build Astro site (incl. internal-link crawl)
        working-directory: docs/site
        run: pnpm run build

      - name: Copy raw benchmark artefacts into dist (results + showcase)
        run: |
          mkdir -p docs/site/dist/benchmarks
          cp -R benchmarks/results_v0.4 docs/site/dist/benchmarks/
          cp -R benchmarks/showcase_v0.4 docs/site/dist/benchmarks/
          mkdir -p docs/site/dist/paper
          if [ -f paper/main.pdf ]; then
            cp paper/main.pdf docs/site/dist/paper/main.pdf
          elif [ -f paper/v0.4/main.pdf ]; then
            cp paper/v0.4/main.pdf docs/site/dist/paper/main.pdf
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
